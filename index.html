<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <div class="container text-center">
  <div class="row">
    <div class="col-3"
    style="background-color: green;">
      The first column

      <div class="card" style="width: 16rem;">
  <img src="images/coffee.jpg" class="card-img-top" alt="..." width="300px" height="240px">
  <div class="card-body">
    <h5 class="card-title">Coffee cup</h5>
    <p class="card-text">Freshly brewed.</p>
    <a href="#" class="btn btn-primary">Click</a>
  </div>
</div>
    </div>

    
    <div class="col-6"
      style="background-color: white;">
    

      <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="images/moka1.webp" class="d-block w-100" alt="..." width="100" height="440">
    </div>
    <div class="carousel-item">
      <img src="images/moka2.webp" class="d-block w-100" alt="..." width="100" height="440">
    </div>
    <div class="carousel-item">
      <img src="images/moka3.webp" class="d-block w-100" alt="..." width="100" height="440">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
    </div>

   
    <div class="col-3"
    style="background-color: red;">
      The third column

      <div class="card" style="width: 16rem;">
  <img src="images/beans.jpg" class="card-img-top" alt="..." width="300px" height="240">
  <div class="card-body">
    <h5 class="card-title">Coffee beans</h5>
    <p class="card-text">Just collected.</p>
    <a href="#" class="btn btn-primary">Click</a>
  </div>
</div>
    </div>
  </div>
</div>
























    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
